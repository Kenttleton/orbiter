[integration]
brand = "github"
name = "GitHub"
description = "Manages the GitHub CLI (gh), remote repo access, and GitHub auth token"
roles = ["tool", "remote", "agent"]
binaries = ["gh"]

[detection]
files = [".git/config"]

[commands]
timeout_seconds = 60
allowed = [
  { cmd = "gh",    description = "GitHub CLI operations (PRs, issues, auth)" },
  { cmd = "git",   description = "VCS operations" },
  { cmd = "which", description = "Locate executables in PATH" },
]

[shell]
exports = [
  { envs = ["GH_TOKEN"], description = "GitHub API token for authenticated CLI operations", sensitive = true },
]

[runtime]
pool_size = 4
input_buffer_kb = 16
output_buffer_kb = 16
