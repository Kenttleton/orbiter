[integration]
brand = "brew"
name = "Homebrew"
description = "Scans and verifies the Homebrew package manager"
roles = ["manager"]
binaries = ["brew"]

[commands]
timeout_seconds = 30
allowed = [
  { cmd = "brew",  description = "Homebrew package manager operations" },
  { cmd = "which", description = "Locate executables in PATH" },
]

[runtime]
pool_size = 4
input_buffer_kb = 8
output_buffer_kb = 8
