[integration]
brand = "google-drive"
name = "Google Drive"
description = "Verifies Google Drive app installation and sync folder linkage"
roles = ["remote"]

[dependencies]
  [dependencies.transponders]
  agent = ["google-auth"]

[commands]
timeout_seconds = 15
allowed = [
  { cmd = "stat",  description = "Check sync folder existence" },
  { cmd = "pgrep", description = "Verify Google Drive app is running" },
]

[runtime]
pool_size = 2
input_buffer_kb = 8
output_buffer_kb = 8
