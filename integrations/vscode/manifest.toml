[integration]
brand = "vscode"
name = "Visual Studio Code"
description = "Detects and verifies the Visual Studio Code editor"
roles = ["tool"]
binaries = ["code"]

[detection]
files = [".vscode/settings.json", ".vscode/launch.json", ".vscode/extensions.json"]

[commands]
timeout_seconds = 30
allowed = [
  { cmd = "code",  description = "VS Code editor operations" },
  { cmd = "which", description = "Locate executables in PATH" },
]

[runtime]
pool_size = 4
input_buffer_kb = 8
output_buffer_kb = 8
