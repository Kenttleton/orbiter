[integration]
brand = "tmux"
name = "tmux"
description = "Propagates Orbiter context to the tmux session environment"
roles = ["multiplexer"]

[detection]
# Not auto-detected — attach explicitly to a planet.

[commands]
timeout_seconds = 5
allowed = [
  { cmd = "tmux",  description = "Terminal multiplexer session management" },
  { cmd = "which", description = "Locate executables in PATH" },
]

[runtime]
pool_size = 2
input_buffer_kb = 8
output_buffer_kb = 8
