[integration]
brand = "uv"
name = "uv"
description = "Scans and verifies the uv Python package manager"
roles = ["manager"]
binaries = ["uv"]

[detection]
files = ["uv.lock"]

[commands]
timeout_seconds = 30
allowed = [
  { cmd = "uv",    description = "Python package manager operations" },
  { cmd = "which", description = "Locate executables in PATH" },
]

[runtime]
pool_size = 4
input_buffer_kb = 8
output_buffer_kb = 8
