[integration]
brand = "google-auth"
name = "Google Auth"
description = "Guides captains through Google authentication for Google Suite integrations"
roles = ["agent"]

[commands]
timeout_seconds = 30
allowed = [
  { cmd = "gcloud", description = "Google Cloud SDK authentication operations" },
  { cmd = "stat",   description = "Check credential file and socket existence" },
  { cmd = "pgrep",  description = "Locate running Google auth processes" },
  { cmd = "which",  description = "Locate executables in PATH" },
]

[runtime]
pool_size = 2
input_buffer_kb = 8
output_buffer_kb = 8
