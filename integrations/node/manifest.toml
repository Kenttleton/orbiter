[integration]
brand = "node"
name = "Node.js"
description = "Scans and verifies the Node.js runtime"
roles = ["runtime"]

[detection]
files = ["package.json"]

[commands]
timeout_seconds = 30
allowed = [
  { cmd = "node",  description = "Node.js runtime version detection" },
  { cmd = "which", description = "Locate executables in PATH" },
]

[runtime]
pool_size = 4
input_buffer_kb = 8
output_buffer_kb = 8
