[integration]
brand = "onepassword"
name = "1Password"
description = "Verifies 1Password CLI authentication state for vault access"
roles = ["vault"]

[commands]
timeout_seconds = 15
allowed = [
  { cmd = "op",    description = "1Password CLI credential and vault operations" },
  { cmd = "which", description = "Locate executables in PATH" },
]

[runtime]
pool_size = 2
input_buffer_kb = 8
output_buffer_kb = 8
