[integration]
brand = "rust"
name = "Rust"
description = "Scans and verifies the Rust compiler and Cargo toolchain"
roles = ["runtime"]

[detection]
files = ["Cargo.toml"]

[commands]
timeout_seconds = 30
allowed = [
  { cmd = "rustc",  description = "Rust compiler version detection" },
  { cmd = "cargo",  description = "Rust build tool and package manager" },
  { cmd = "rustup", description = "Rust toolchain manager (if present)" },
  { cmd = "which",  description = "Locate executables in PATH" },
]

[runtime]
pool_size = 4
input_buffer_kb = 8
output_buffer_kb = 8
