[integration]
brand = "ssh"
name = "SSH Agent"
description = "Verifies SSH agent availability and loaded key count"
roles = ["agent"]

[commands]
timeout_seconds = 15
allowed = [
  { cmd = "ssh-agent", description = "Manage the SSH authentication agent process" },
  { cmd = "ssh-add",   description = "Add keys to and query the SSH agent" },
  { cmd = "which",     description = "Locate executables in PATH" },
]

[runtime]
pool_size = 2
input_buffer_kb = 8
output_buffer_kb = 8
