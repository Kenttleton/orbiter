[integration]
brand = "golang"
name = "Go Toolchain"
description = "Scans and verifies the Go runtime and module toolchain"
roles = ["runtime"]
binaries = ["go"]

[detection]
files = ["go.mod", "go.sum"]

[commands]
timeout_seconds = 30
allowed = [
  { cmd = "go",    description = "Go toolchain operations" },
  { cmd = "which", description = "Locate executables in PATH" },
]

[runtime]
pool_size = 4
input_buffer_kb = 8
output_buffer_kb = 8
