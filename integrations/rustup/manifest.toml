[integration]
brand = "rustup"
name = "rustup"
description = "Scans and verifies the Rust toolchain manager"
roles = ["manager"]

[dependencies]
  [dependencies.resources]
  runtime = ["rust"]

[commands]
allowed = ["rustup", "which"]
timeout_seconds = 30

[runtime]
pool_size = 4
input_buffer_kb = 8
output_buffer_kb = 8
