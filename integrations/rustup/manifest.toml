[integration]
brand = "rustup"
name = "rustup"
description = "Scans and verifies the Rust toolchain manager"
roles = ["manager"]
binaries = ["rustup"]

[dependencies]
  [dependencies.resources]
  runtime = ["rust"]

[commands]
timeout_seconds = 30
allowed = [
  { cmd = "rustup", description = "Rust toolchain manager operations" },
]

[runtime]
pool_size = 4
input_buffer_kb = 8
output_buffer_kb = 8
