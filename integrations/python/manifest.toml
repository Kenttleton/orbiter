[integration]
brand = "python"
name = "Python"
description = "Scans and verifies the Python 3 runtime"
roles = ["runtime"]

[detection]
files = ["pyproject.toml", "requirements.txt", "setup.py"]

[commands]
allowed = ["python3", "which", "uv", "pyenv"]
timeout_seconds = 30

[runtime]
pool_size = 4
input_buffer_kb = 8
output_buffer_kb = 8
