[integration]
brand = "python"
name = "Python"
description = "Scans and verifies the Python 3 runtime"
roles = ["runtime"]
binaries = ["python3"]

[detection]
files = ["pyproject.toml", "requirements.txt", "setup.py"]

[commands]
timeout_seconds = 30
allowed = [
  { cmd = "python3", description = "Python interpreter version detection" },
  { cmd = "which",   description = "Locate executables in PATH" },
  { cmd = "uv",      description = "uv Python package manager (if present)" },
  { cmd = "pyenv",   description = "pyenv Python version manager (if present)" },
]

[runtime]
pool_size = 4
input_buffer_kb = 8
output_buffer_kb = 8
