[integration]
brand = "docker"
name = "Docker"
description = "Scans and verifies the Docker container runtime"
roles = ["tool"]
binaries = ["docker"]

[detection]
files = ["Dockerfile", "docker-compose.yml", "docker-compose.yaml"]

[commands]
timeout_seconds = 30
allowed = [
  { cmd = "docker", description = "Container runtime operations" },
  { cmd = "which",  description = "Locate executables in PATH" },
]

[runtime]
pool_size = 4
input_buffer_kb = 8
output_buffer_kb = 16
