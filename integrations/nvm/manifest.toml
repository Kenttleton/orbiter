[integration]
brand = "nvm"
name = "nvm"
description = "Scans and verifies the Node Version Manager"
roles = ["manager"]
binaries = ["node"]

[detection]
files = [".nvmrc", ".node-version"]

[dependencies]
  [dependencies.resources]
  runtime = ["node"]

[commands]
timeout_seconds = 30
allowed = [
  { cmd = "node",  description = "Node.js runtime version detection" },
  { cmd = "which", description = "Locate executables in PATH" },
]

[shell]
exports = [
  { envs = ["NVM_DIR", "NVM_BIN"], description = "nvm installation directory and active Node.js binary path", sensitive = false },
]

[runtime]
pool_size = 4
input_buffer_kb = 8
output_buffer_kb = 8
