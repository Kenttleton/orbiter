[integration]
brand = "dotenv"
name = ".env File"
description = "Detects and validates .env credential files"
roles = ["file"]

[detection]
files = [".env"]

[commands]
timeout_seconds = 10
allowed = [
  { cmd = "which", description = "Locate executables in PATH" },
]

[runtime]
pool_size = 2
input_buffer_kb = 8
output_buffer_kb = 8
