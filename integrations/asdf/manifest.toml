[integration]
brand = "asdf"
name = "asdf"
description = "Scans and verifies the asdf version manager"
roles = ["manager"]

[detection]
files = [".tool-versions"]

[commands]
timeout_seconds = 30
allowed = [
  { cmd = "asdf",  description = "Version manager operations" },
  { cmd = "which", description = "Locate executables in PATH" },
]

[runtime]
pool_size = 4
input_buffer_kb = 8
output_buffer_kb = 8
