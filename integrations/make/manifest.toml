[integration]
brand = "make"
name = "Make"
description = "Detects and verifies the make build tool"
roles = ["tool"]
binaries = ["make"]

[detection]
files = ["Makefile", "GNUmakefile"]

[commands]
timeout_seconds = 30
allowed = [
  { cmd = "make",  description = "Build tool operations" },
  { cmd = "which", description = "Locate executables in PATH" },
]

[runtime]
pool_size = 4
input_buffer_kb = 8
output_buffer_kb = 8
