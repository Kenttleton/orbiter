[integration]
brand = "just"
name = "just"
description = "Detects and verifies the just command runner"
roles = ["tool"]

[detection]
files = ["Justfile", "justfile"]

[commands]
timeout_seconds = 30
allowed = [
  { cmd = "just",  description = "Task runner operations" },
  { cmd = "which", description = "Locate executables in PATH" },
]

[runtime]
pool_size = 4
input_buffer_kb = 8
output_buffer_kb = 8
