[integration]
brand = "local"
name = "Local Filesystem"
description = "Manages local directory state and working directory for the jump lifecycle"
roles = ["shell"]

[commands]
timeout_seconds = 15
allowed = [
  { cmd = "stat",  description = "Check directory existence" },
  { cmd = "mkdir", description = "Create project directory" },
  { cmd = "pwd",   description = "Get current working directory" },
]

[runtime]
pool_size = 2
input_buffer_kb = 8
output_buffer_kb = 8
