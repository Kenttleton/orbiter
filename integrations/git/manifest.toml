[integration]
brand = "git"
name = "Git"
description = "Verifies the git tool and authenticates git remote operations"
roles = ["tool", "file", "env", "agent", "keychain", "vault"]

[detection]
files = [".git/config"]

[commands]
timeout_seconds = 30
allowed = [
  { cmd = "git",        description = "VCS and remote operations" },
  { cmd = "which",      description = "Locate executables in PATH" },
  { cmd = "ssh-keygen", description = "Generate SSH key pairs for remote authentication" },
  { cmd = "ssh-add",    description = "Add SSH keys to the authentication agent" },
  { cmd = "ssh-agent",  description = "Manage the SSH authentication agent process" },
  { cmd = "stat",       description = "Check credential file existence and permissions" },
  { cmd = "chmod",      description = "Set credential file permissions" },
]

[shell]
exports = [
  { envs = ["SSH_AUTH_SOCK", "SSH_AGENT_PID"], description = "SSH agent socket and process ID for key forwarding", sensitive = false },
  { envs = ["GIT_SSH_COMMAND"],                description = "Override SSH command used by git for remote operations", sensitive = false },
  { envs = ["GIT_ASKPASS"],                    description = "Credential helper executable path for git prompts", sensitive = false },
  { envs = ["GIT_CONFIG_COUNT", "GIT_CONFIG_KEY_0", "GIT_CONFIG_VALUE_0"], description = "Runtime git configuration injection", sensitive = false },
]

[dependencies]
[dependencies.resources]
remote = []

[dependencies.transponders]
agent    = []
keychain = []

[runtime]
pool_size = 4
input_buffer_kb = 8
output_buffer_kb = 8
