[integration]
brand = "macos"
name = "macOS Keychain"
description = "Verifies macOS Keychain availability for credential access"
roles = ["keychain"]

[commands]
timeout_seconds = 15
allowed = [
  { cmd = "security", description = "macOS Keychain credential access" },
  { cmd = "which",    description = "Locate executables in PATH" },
]

[runtime]
pool_size = 2
input_buffer_kb = 8
output_buffer_kb = 8
